<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Members - QUASAR Collaboration</title>
    <meta name="description"
        content="Meet the researchers, students, and staff of the QUASAR Collaboration across UQ, QUT, and UniSQ.">
    <link rel="canonical" href="https://quasarcollaboration.github.io/pages/members.html">

    <!-- Open Graph Tags -->
    <meta property="og:title" content="Members - QUASAR Collaboration">
    <meta property="og:description"
        content="Meet the researchers, students, and staff of the QUASAR Collaboration across UQ, QUT, and UniSQ.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://quasarcollaboration.github.io/pages/members.html">
    <meta property="og:site_name" content="QUASAR Collaboration">
    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@500;700;800&display=swap"
        rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: ['class', '.dark-mode'],
            theme: {
                extend: {
                    colors: {
                        slate: {
                            800: 'var(--text-primary)',
                            700: 'var(--text-secondary)',
                            600: 'var(--text-secondary)',
                            500: 'var(--text-muted)',
                            400: 'var(--text-muted)',
                            900: 'var(--bg-gradient-end)',
                            200: 'var(--glass-border)',
                            50: 'var(--glass-bg)',
                        },
                        indigo: {
                            600: 'var(--accent-primary)',
                            100: 'var(--glass-border)',
                            50: 'var(--glass-border)',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Outfit', 'sans-serif'],
                    }
                }
            }
        }
        window.tailwindCSS = { ...window.tailwindCSS, suppressWarnings: true };
    </script>
    <script>
        // Anti-Flicker & Default Light Mode
        (function () {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'dark') {
                document.documentElement.classList.add('dark-mode');
            } else {
                document.documentElement.classList.remove('dark-mode');
            }
        })();
    </script>
    <script src="../assets/js/members_data.js"></script>
    <script src="../assets/js/components.js" defer></script>
    <script src="../assets/js/theme-toggle.js" defer></script>
    <link rel="stylesheet" href="../assets/css/style.css">
</head>

<body class="min-h-screen flex flex-col relative overflow-x-hidden">
    <!-- Background handled by CSS body gradient -->

    <layout-header base-path="../" active-page="members"></layout-header>

    <main class="relative z-10 flex-grow container mx-auto px-4 py-12">
        <!-- Partner Universities Section -->
        <!-- Partner Universities Section Removed -->

        <div class="text-center mb-12">
            <h2 class="text-4xl font-display font-bold text-slate-800 mb-4">Our Members</h2>
            <p class="text-lg text-slate-600 max-w-2xl mx-auto">Meet the researchers and students collaborating on
                cutting-edge astronomy and space science projects.</p>
        </div>

        <!-- Filters -->
        <div class="max-w-7xl mx-auto mb-8 px-4">
            <div class="flex flex-wrap justify-center gap-4">
                <div class="relative">
                    <input type="text" id="member-search" placeholder="Search members..."
                        class="appearance-none bg-white dark:bg-gray-900 border border-indigo-100 dark:border-gray-700 text-slate-700 dark:text-gray-200 py-2 px-4 pr-10 rounded-lg leading-tight focus:outline-none focus:bg-white dark:focus:bg-gray-800 focus:border-indigo-500 shadow-sm min-w-[200px] transition-colors">
                    <div class="absolute inset-y-0 right-0 flex items-center px-3 text-slate-400">
                        <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                        </svg>
                    </div>
                </div>
                <div class="relative">
                    <select id="filter-discipline"
                        class="appearance-none bg-white dark:bg-gray-900 border border-indigo-100 dark:border-gray-700 text-slate-700 dark:text-gray-200 py-2 px-4 pr-8 rounded-lg leading-tight focus:outline-none focus:bg-white dark:focus:bg-gray-800 focus:border-indigo-500 shadow-sm cursor-pointer min-w-[200px] transition-colors">
                        <option value="">All Disciplines</option>
                    </select>
                    <div
                        class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-2 text-slate-700 dark:text-slate-400">
                        <svg class="fill-current h-4 w-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20">
                            <path d="M9.293 12.95l.707.707L15.657 8l-1.414-1.414L10 10.828 5.757 6.586 4.343 8z" />
                        </svg>
                    </div>
                </div>
                <div class="relative">
                    <select id="filter-university"
                        class="appearance-none bg-white dark:bg-gray-900 border border-indigo-100 dark:border-gray-700 text-slate-700 dark:text-gray-200 py-2 px-4 pr-8 rounded-lg leading-tight focus:outline-none focus:bg-white dark:focus:bg-gray-800 focus:border-indigo-500 shadow-sm cursor-pointer min-w-[200px] transition-colors">
                        <option value="">All Universities</option>
                    </select>
                    <div
                        class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-2 text-slate-700 dark:text-slate-400">
                        <svg class="fill-current h-4 w-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20">
                            <path d="M9.293 12.95l.707.707L15.657 8l-1.414-1.414L10 10.828 5.757 6.586 4.343 8z" />
                        </svg>
                    </div>
                </div>
            </div>
        </div>

        <!-- Member Cards Grid -->
        <div id="members-grid"
            class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 max-w-7xl mx-auto min-h-[400px]">
            <!-- Loading State -->
            <div class="col-span-full flex flex-col items-center justify-center text-slate-400 py-12">
                <svg class="animate-spin h-10 w-10 text-indigo-500 mb-4" xmlns="http://www.w3.org/2000/svg" fill="none"
                    viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor"
                        d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
                    </path>
                </svg>
                <p>Loading members...</p>
            </div>
        </div>

        <script>
            document.addEventListener('DOMContentLoaded', function () {
                // Use data directly from the loaded script
                const allMembers = window.membersData || [];
                const grid = document.getElementById('members-grid');
                const filterDiscipline = document.getElementById('filter-discipline');
                const filterUniversity = document.getElementById('filter-university');
                const searchInput = document.getElementById('member-search');

                // Populate Filters
                const disciplines = [...new Set(allMembers.map(m => m.primary_field).filter(Boolean))].sort();
                const universities = [...new Set(allMembers.map(m => m.affiliation).filter(Boolean))].sort();

                disciplines.forEach(d => {
                    const option = document.createElement('option');
                    option.value = d;
                    option.textContent = d;
                    filterDiscipline.appendChild(option);
                });

                universities.forEach(u => {
                    const option = document.createElement('option');
                    option.value = u;
                    option.textContent = u;
                    filterUniversity.appendChild(option);
                });

                // Filter Logic
                function filterMembers() {
                    const discipline = filterDiscipline.value;
                    const university = filterUniversity.value;
                    const searchTerm = searchInput.value.toLowerCase();

                    const filtered = allMembers.filter(member => {
                        const matchDiscipline = !discipline || member.primary_field === discipline;
                        const matchUniversity = !university || member.affiliation === university;

                        const name = (member.name || '').toLowerCase();
                        const interests = (member.interests || '').toLowerCase();
                        const field = (member.primary_field || '').toLowerCase();
                        const affiliation = (member.affiliation || '').toLowerCase();

                        const matchSearch = !searchTerm ||
                            name.includes(searchTerm) ||
                            interests.includes(searchTerm) ||
                            field.includes(searchTerm) ||
                            affiliation.includes(searchTerm);

                        return matchDiscipline && matchUniversity && matchSearch;
                    });

                    renderMembers(filtered);
                }

                filterDiscipline.addEventListener('change', filterMembers);
                filterUniversity.addEventListener('change', filterMembers);
                searchInput.addEventListener('input', filterMembers);

                // Initial Render
                renderMembers(allMembers);

                function renderMembers(data) {
                    grid.innerHTML = ''; // Clear grid

                    if (data.length === 0) {
                        grid.innerHTML = '<div class="col-span-full text-center text-slate-500">No members found matching criteria.</div>';
                        return;
                    }

                    data.forEach(member => {
                        // Normalize data
                        const name = member.name || 'Unknown Member';
                        // const role = member.role || 'Member'; // Role removed from display
                        const affiliation = member.affiliation || '';
                        const interests = member.interests ? member.interests.split(',').filter(i => i.trim()) : [];
                        const primaryField = member.primary_field || '';
                        const careerStage = member.career_stage || '';
                        const email = member.email || '';

                        // Handle photo path adjustment
                        let photoPath = member.photo;
                        if (photoPath && !photoPath.startsWith('http') && !photoPath.startsWith('../') && !photoPath.startsWith('data:')) {
                            photoPath = '../' + photoPath;
                        }

                        // Photo HTML - only create if photo exists
                        let photoHtml = '';
                        if (photoPath && member.photo !== 'assets/img/default-avatar.png') {
                            photoHtml = `
                            <div class="w-24 h-24 mb-4 rounded-full overflow-hidden border-[3px] border-white shadow-md bg-slate-200 relative group-hover:border-indigo-100 transition-colors">
                                <img src="${photoPath}" alt="${name}" class="w-full h-full object-cover" onerror="this.parentElement.style.display='none'">
                            </div>`;
                        }

                        const website = member.website || '#';

                        const card = document.createElement('div');
                        card.className = 'glass-panel rounded-2xl p-6 shadow-xl flex flex-col items-center text-center h-full transition-all hover:scale-[1.02] hover:shadow-2xl border border-white/50';

                        let tagsHtml = '';
                        if (interests.length > 0) {
                            tagsHtml = `<div class="flex flex-wrap justify-center gap-1.5 mt-3 w-full">
                                ${interests.slice(0, 5).map(tag => `<span class="px-2 py-0.5 bg-indigo-50/80 text-indigo-700 text-[10px] font-bold uppercase tracking-wider rounded-sm border border-indigo-100">${tag.trim()}</span>`).join('')}
                                ${interests.length > 5 ? `<span class="px-2 py-0.5 text-slate-400 text-[10px]">+${interests.length - 5} more</span>` : ''}
                            </div>`;
                        }

                        // Action buttons (Website, Email)
                        let actionsHtml = '<div class="mt-auto pt-4 w-full flex justify-center gap-2">';

                        if (member.website) {
                            actionsHtml += `
                                <a href="${member.website}" target="_blank" class="p-2 text-slate-400 hover:text-indigo-600 transition-colors rounded-full hover:bg-indigo-50" aria-label="Website">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9m-9 9a9 9 0 019-9" /></svg>
                                </a>`;
                        }

                        if (email) {
                            actionsHtml += `
                                <a href="mailto:${email}" class="p-2 text-slate-400 hover:text-indigo-600 transition-colors rounded-full hover:bg-indigo-50" aria-label="Email">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
                                </a>`;
                        }

                        actionsHtml += '</div>';
                        if (!member.website && !email) actionsHtml = '<div class="h-8 mt-auto"></div>';


                        card.innerHTML = `
                ${photoHtml}
                <h3 class="text-lg font-bold text-slate-800 leading-tight mb-1">${name}</h3>
                ${careerStage ? `<p class="text-xs font-semibold text-indigo-600 uppercase tracking-widest mb-1">${careerStage}</p>` : ''}
                ${primaryField ? `<p class="text-sm font-semibold text-slate-700 mb-1">${primaryField}</p>` : ''}
                <p class="text-sm text-slate-500 mb-4 italic leading-snug flex items-center justify-center">${affiliation}</p>

                <div class="w-16 h-px bg-slate-200 my-2"></div>

                ${tagsHtml}

                ${actionsHtml}
                `;
                        grid.appendChild(card);
                    });
                }
            });

            // Fallback avatar generator
            function generateAvatar(name) {
                const initials = name.split(' ').map(n => n[0]).join('').substring(0, 2).toUpperCase();
                return `data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100%" height="100%" fill="%23e0e7ff" /><text x="50" y="50" font-family="Arial" font-size="40" fill="%236366f1" text-anchor="middle" dy=".3em" font-weight="bold">${initials}</text></svg>`;
            }
        </script>
    </main>

    <layout-footer custom-classes="mt-16"></layout-footer>
</body>

</html>
