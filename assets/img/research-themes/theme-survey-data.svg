<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
    <defs>
        <linearGradient id="bgData" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#020b14" />
            <stop offset="100%" stop-color="#0a1930" />
        </linearGradient>

        <linearGradient id="waveGrad" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%" stop-color="#00f2fe" stop-opacity="0" />
            <stop offset="50%" stop-color="#4facfe" stop-opacity="1" />
            <stop offset="100%" stop-color="#00f2fe" stop-opacity="0" />
        </linearGradient>

        <style>
            .data-stream {
                font-family: monospace;
                font-size: 14px;
                fill: #00f2fe;
                opacity: 0.3;
                animation: scrollData 20s linear infinite;
            }
            .data-stream-2 {
                animation: scrollData Reverse 15s linear infinite;
            }
            @keyframes scrollData {
                0% { transform: translateY(0); }
                100% { transform: translateY(-300px); }
            }
            
            .wave {
                fill: none;
                stroke: url(#waveGrad);
                stroke-width: 3;
                animation: waveMove 3s linear infinite;
            }
            @keyframes waveMove {
                0% { stroke-dashoffset: 0; }
                100% { stroke-dashoffset: 200; }
            }
            
            .dish {
                transform-origin: 200px 350px;
                animation: scanDish 10s ease-in-out infinite alternate;
            }
            @keyframes scanDish {
                0% { transform: rotate(-15deg); }
                100% { transform: rotate(25deg); }
            }
            
            .dish-signal {
                stroke: #00f2fe;
                stroke-width: 2;
                fill: none;
                animation: signalPulse 2s infinite;
            }
            @keyframes signalPulse {
                0% { opacity: 1; transform: scale(1); }
                100% { opacity: 0; transform: scale(3); }
            }
        </style>
    </defs>

    <rect width="800" height="450" fill="url(#bgData)" />

    <!-- Binary Data Background -->
    <g opacity="0.4">
        <!-- Many text blocks moving up to simulate data streams -->
        <text class="data-stream" x="50" y="500">
            <tspan x="50" dy="20">01001011 01101111</tspan>
            <tspan x="50" dy="20">11010010 00101100</tspan>
            <tspan x="50" dy="20">01010101 11110000</tspan>
            <tspan x="50" dy="20">10101010 01010101</tspan>
            <tspan x="50" dy="20">11100011 00011100</tspan>
            <tspan x="50" dy="20">01001011 01101111</tspan>
            <tspan x="50" dy="20">11010010 00101100</tspan>
            <tspan x="50" dy="20">01001011 01101111</tspan>
            <tspan x="50" dy="20">11010010 00101100</tspan>
            <tspan x="50" dy="20">01010101 11110000</tspan>
            <tspan x="50" dy="20">10101010 01010101</tspan>
            <tspan x="50" dy="20">11100011 00011100</tspan>
            <tspan x="50" dy="20">01001011 01101111</tspan>
            <tspan x="50" dy="20">11010010 00101100</tspan>
            <tspan x="50" dy="20">10101010 01010101</tspan>
        </text>
        <text class="data-stream data-stream-2" x="600" y="500" fill="#4facfe">
            <tspan x="600" dy="20">ASKAP J2322-0509</tspan>
            <tspan x="600" dy="20">RA: 23h 22m 34s</tspan>
            <tspan x="600" dy="20">DEC: -05° 09' 22"</tspan>
            <tspan x="600" dy="20">FLUX: 14.5 mJy</tspan>
            <tspan x="600" dy="20">FREQ: 1.4 GHz</tspan>
            <tspan x="600" dy="20">SNR: 24.3</tspan>
            <tspan x="600" dy="20">ASKAP J2322-0509</tspan>
            <tspan x="600" dy="20">RA: 23h 22m 34s</tspan>
            <tspan x="600" dy="20">DEC: -05° 09' 22"</tspan>
            <tspan x="600" dy="20">FLUX: 14.5 mJy</tspan>
            <tspan x="600" dy="20">FREQ: 1.4 GHz</tspan>
            <tspan x="600" dy="20">SNR: 24.3</tspan>
        </text>
    </g>

    <!-- Multi-Wavelength Sine Waves (Spectra) -->
    <g transform="translate(0, 100)" stroke-dasharray="200, 200">
        <!-- Radio -->
        <path class="wave" d="M -200 50 Q -150 0 -100 50 T 0 50 T 100 50 T 200 50 T 300 50 T 400 50 T 500 50 T 600 50 T 700 50 T 800 50 T 900 50 T 1000 50" stroke="#ff4d4d" style="animation-duration: 4s;" />
        <!-- Optical -->
        <path class="wave" d="M -200 100 Q -180 60 -160 100 T -120 100 T -80 100 T -40 100 T 0 100 T 40 100 T 80 100 T 120 100 T 160 100 T 200 100 T 240 100 T 280 100 T 320 100 T 360 100 T 400 100 T 440 100 T 480 100 T 520 100 T 560 100 T 600 100 T 640 100 T 680 100 T 720 100 T 760 100 T 800 100 T 840 100 T 880 100 T 920 100 T 960 100 T 1000 100" stroke="#00f2fe" style="animation-duration: 2s;" />
        <!-- X-Ray -->
        <path class="wave" d="M -200 150 Q -195 120 -190 150 T -180 150 T -170 150 T -160 150 T -150 150 T -140 150 T -130 150 T -120 150 T -110 150 T -100 150 T -90 150 T -80 150 T -70 150 T -60 150 T -50 150 T -40 150 T -30 150 T -20 150 T -10 150 T 0 150 T 10 150 T 20 150 T 30 150 T 40 150 T 50 150 T 60 150 T 70 150 T 80 150 T 90 150 T 100 150 T 110 150 T 120 150 T 130 150 T 140 150 T 150 150 T 160 150 T 170 150 T 180 150 T 190 150 T 200 150 T 210 150 T 220 150 T 230 150 T 240 150 T 250 150 T 260 150 T 270 150 T 280 150 T 290 150 T 300 150 T 310 150 T 320 150 T 330 150 T 340 150 T 350 150 T 360 150 T 370 150 T 380 150 T 390 150 T 400 150 T 410 150 T 420 150 T 430 150 T 440 150 T 450 150 T 460 150 T 470 150 T 480 150 T 490 150 T 500 150" stroke="#9013fe" style="animation-duration: 0.8s; stroke-dasharray: 200, 200;" />
    </g>

    <!-- Synthetic Galaxy Mapping HUD -->
    <g transform="translate(350, 200)">
        <rect x="0" y="0" width="220" height="180" fill="rgba(0,242,254,0.05)" stroke="#00f2fe" stroke-width="1" rx="5" />
        <path d="M 0 45 H 220 M 0 90 H 220 M 0 135 H 220 M 55 0 V 180 M 110 0 V 180 M 165 0 V 180" stroke="rgba(0,242,254,0.15)" stroke-width="1" />
        <circle cx="110" cy="90" r="50" fill="url(#waveGrad)" opacity="0.6"/>
        <ellipse cx="110" cy="90" rx="70" ry="25" fill="none" stroke="#ff4d4d" stroke-width="2" transform="rotate(25, 110, 90)"/>
        <!-- Crosshair -->
        <path d="M 110 20 V 160 M 30 90 H 190" stroke="#ffffff" stroke-width="1" />
        <!-- Data Labels UI -->
        <text x="5" y="15" fill="#00f2fe" font-family="monospace" font-size="10">SOURCE DETECTED</text>
        <text x="5" y="170" fill="#4facfe" font-family="monospace" font-size="10">z = 2.45</text>
    </g>

    <!-- Radio Dish -->
    <g class="dish" transform="translate(40, -20)">
        <!-- Pedestal -->
        <path d="M 180 450 L 190 350 L 210 350 L 220 450 Z" fill="#0a1930" stroke="#00f2fe" stroke-width="2" />
        <!-- Mount -->
        <circle cx="200" cy="350" r="10" fill="#00f2fe" />
        <!-- Dish curve -->
        <path d="M 100 250 Q 200 320 300 250" fill="none" stroke="#00f2fe" stroke-width="4" />
        <path d="M 120 265 L 200 200 L 280 265" fill="none" stroke="rgba(0,242,254,0.5)" stroke-width="2" />
        <circle cx="200" cy="200" r="4" fill="#ff4d4d" />
        
        <!-- Signals coming to dish -->
        <path d="M 170 50 Q 150 100 200 200" class="dish-signal" style="animation-delay: 0s" />
        <path d="M 230 50 Q 250 100 200 200" class="dish-signal" style="animation-delay: 1s" />
    </g>

</svg>
