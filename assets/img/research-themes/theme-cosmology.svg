<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
    <defs>
        <!-- Dark cosmic background -->
        <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#050510" />
            <stop offset="50%" stop-color="#1a1025" />
            <stop offset="100%" stop-color="#050510" />
        </linearGradient>

        <radialGradient id="cmbglow" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#4a306d" stop-opacity="0.4"/>
            <stop offset="70%" stop-color="#2a1045" stop-opacity="0.2"/>
            <stop offset="100%" stop-color="#050510" stop-opacity="0"/>
        </radialGradient>
        
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
        
        <style>
            .grid-line {
                stroke: rgba(100, 150, 255, 0.2);
                stroke-width: 1;
                transform-origin: center;
                animation: expandGrid 15s linear infinite;
            }
            @keyframes expandGrid {
                0% { transform: scale(1); opacity: 0; }
                10% { opacity: 0.5; }
                90% { opacity: 0.5; }
                100% { transform: scale(2); opacity: 0; }
            }
            .filament {
                fill: none;
                stroke: url(#filamentGrad);
                stroke-width: 2;
                filter: url(#glow);
                animation: pulseNet 8s ease-in-out infinite alternate;
            }
            @keyframes pulseNet {
                0% { opacity: 0.4; stroke-width: 1; }
                100% { opacity: 1; stroke-width: 3; }
            }
            .node {
                fill: #a0d8ef;
                filter: url(#glow);
                animation: pulseNode 4s ease-in-out infinite alternate;
            }
            @keyframes pulseNode {
                0% { r: 3; opacity: 0.4; }
                100% { r: 6; opacity: 1; }
            }
        </style>
        
        <linearGradient id="filamentGrad" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#4a90e2" />
            <stop offset="50%" stop-color="#9013fe" />
            <stop offset="100%" stop-color="#50e3c2" />
        </linearGradient>
    </defs>

    <rect width="800" height="450" fill="url(#bg)" />
    <circle cx="400" cy="225" r="400" fill="url(#cmbglow)" />

    <!-- Expanding Grid for expanding universe -->
    <g id="grid" transform="translate(400, 225)">
        <g>
            <path class="grid-line" stroke-dasharray="5,5" d="M -400 -112 H 400 M -400 0 H 400 M -400 112 H 400 
                     M -200 -225 V 225 M 0 -225 V 225 M 200 -225 V 225
                     M -400 -168 H 400 M -400 -56 H 400 M -400 56 H 400 M -400 168 H 400
                     M -300 -225 V 225 M -100 -225 V 225 M 100 -225 V 225 M 300 -225 V 225" />
        </g>
    </g>

    <g opacity="0.8">
        <!-- Cosmic Web Filaments -->
        <path class="filament" d="M 200 100 Q 300 150 400 225 T 600 350" style="animation-delay: 0s" />
        <path class="filament" d="M 150 350 Q 300 300 400 225 T 650 100" style="animation-delay: 1s" />
        <path class="filament" d="M 400 50 Q 380 150 400 225 T 450 400" style="animation-delay: 2s" />
        <path class="filament" d="M 600 150 Q 500 200 400 225 T 250 300" style="animation-delay: -1s" />
        <path class="filament" d="M 100 225 Q 250 200 400 225 T 700 250" style="animation-delay: -2s" />

        <path class="filament" d="M 200 100 Q 150 150 100 225" style="animation-delay: 0.5s" />
        <path class="filament" d="M 650 100 Q 620 120 600 150" style="animation-delay: 1.5s" />
        <path class="filament" d="M 250 300 Q 200 330 150 350" style="animation-delay: 2.5s" />
        <path class="filament" d="M 600 350 Q 650 300 700 250" style="animation-delay: 3.5s" />
    </g>

    <!-- Nodes (Galaxy Clusters) -->
    <circle class="node" cx="400" cy="225" r="6" style="animation-delay: 0s;" />
    <circle class="node" cx="200" cy="100" r="4" style="animation-delay: 1s;" />
    <circle class="node" cx="600" cy="350" r="4" style="animation-delay: 2s;" />
    <circle class="node" cx="150" cy="350" r="4" style="animation-delay: 1.5s;" />
    <circle class="node" cx="650" cy="100" r="4" style="animation-delay: 0.5s;" />
    <circle class="node" cx="400" cy="50"  r="3" style="animation-delay: 2.5s;" />
    <circle class="node" cx="450" cy="400" r="3" style="animation-delay: 1.2s;" />
    <circle class="node" cx="600" cy="150" r="3" style="animation-delay: 0.8s;" />
    <circle class="node" cx="250" cy="300" r="3" style="animation-delay: 1.8s;" />
    <circle class="node" cx="100" cy="225" r="3" style="animation-delay: 0.3s;" />
    <circle class="node" cx="700" cy="250" r="3" style="animation-delay: 2.2s;" />

</svg>
