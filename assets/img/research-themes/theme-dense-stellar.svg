<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
    <defs>
        <radialGradient id="bhGlow1" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#000000" />
            <stop offset="35%" stop-color="#000000" />
            <stop offset="38%" stop-color="#ffffff" />
            <stop offset="50%" stop-color="#00ffff" stop-opacity="0.8" />
            <stop offset="100%" stop-color="#050510" stop-opacity="0" />
        </radialGradient>
        
        <radialGradient id="bhGlow2" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#000000" />
            <stop offset="30%" stop-color="#000000" />
            <stop offset="33%" stop-color="#ffffff" />
            <stop offset="50%" stop-color="#ff4500" stop-opacity="0.8" />
            <stop offset="100%" stop-color="#050510" stop-opacity="0" />
        </radialGradient>

        <style>
            .bh-system {
                transform-origin: center;
                animation: orbit 1.5s linear infinite;
            }
            @keyframes orbit {
                0% { transform: rotate(0deg) scale(1); }
                50% { transform: rotate(180deg) scale(0.95); }
                100% { transform: rotate(360deg) scale(1); }
            }
            
            .gw-ripple {
                fill: none;
                stroke: #a020f0;
                transform-origin: center;
                animation: rippleOut 2s linear infinite;
            }
            @keyframes rippleOut {
                0% { r: 60; stroke-opacity: 0.8; stroke-width: 4; }
                100% { r: 500; stroke-opacity: 0; stroke-width: 0.5; }
            }
            
            .starfield {
                animation: panStars 120s linear infinite;
            }
            @keyframes panStars {
                0% { transform: translateX(0); }
                100% { transform: translateX(-800px); }
            }
        </style>
    </defs>

    <rect width="800" height="450" fill="#020008" />

    <!-- Distorted starfield logic just simplified to random stars -->
    <g class="starfield" fill="white" opacity="0.5">
        <circle cx="100" cy="50" r="1.5" /><circle cx="200" cy="150" r="1" />
        <circle cx="50" cy="300" r="2" /><circle cx="350" cy="400" r="1" />
        <circle cx="600" cy="80" r="1.5" /><circle cx="750" cy="200" r="2" />
        <circle cx="650" cy="350" r="1" /><circle cx="500" cy="250" r="0.5" />
        <circle cx="900" cy="50" r="1.5" /><circle cx="1000" cy="150" r="1" />
        <circle cx="850" cy="300" r="2" /><circle cx="1150" cy="400" r="1" />
        <circle cx="1400" cy="80" r="1.5" /><circle cx="1550" cy="200" r="2" />
        <circle cx="1450" cy="350" r="1" /><circle cx="1300" cy="250" r="0.5" />
    </g>

    <!-- Gravitational Waves -->
    <circle cx="400" cy="225" r="50" class="gw-ripple" style="animation-delay: 0s;" />
    <circle cx="400" cy="225" r="50" class="gw-ripple" style="animation-delay: 0.4s;" />
    <circle cx="400" cy="225" r="50" class="gw-ripple" style="animation-delay: 0.8s;" />
    <circle cx="400" cy="225" r="50" class="gw-ripple" style="animation-delay: 1.2s;" />
    <circle cx="400" cy="225" r="50" class="gw-ripple" style="animation-delay: 1.6s;" />

    <g class="bh-system" transform="translate(400, 225)">
        <!-- Black hole 1 -->
        <g transform="translate(45, 0)">
            <circle cx="0" cy="0" r="40" fill="url(#bhGlow1)" />
            <!-- Lensed accretion disk silhouette -->
            <path d="M -30 0 A 30 8 0 1 1 30 0" fill="none" stroke="#00ffff" stroke-width="3" opacity="0.8" transform="rotate(20)" />
            <path d="M -35 0 A 35 30 0 0 0 35 0" fill="none" stroke="#00ffff" stroke-width="1.5" opacity="0.4" transform="rotate(20) translateY(-6)" />
        </g>
        <!-- Black hole 2 -->
        <g transform="translate(-45, 0)">
            <circle cx="0" cy="0" r="35" fill="url(#bhGlow2)" />
            <path d="M -25 0 A 25 6 0 1 1 25 0" fill="none" stroke="#ff4500" stroke-width="3" opacity="0.8" transform="rotate(-15)" />
            <path d="M -30 0 A 30 25 0 0 0 30 0" fill="none" stroke="#ff4500" stroke-width="1.5" opacity="0.4" transform="rotate(-15) translateY(-5)" />
        </g>
    </g>

</svg>
